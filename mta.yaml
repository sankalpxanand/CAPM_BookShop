_schema-version: 3.3.0
ID: CAPM_BookShop
description: A simple CAP project.
version: 1.0.0
modules:
- name: CAPM_BookShop-srv
  type: nodejs
  path: gen/srv
  requires:
  - name: CAPM_BookShop-db
  - name: CAPM_BookShop-uaa
  - name: CAPM_BookShop-destination-service
  provides:
  - name: srv-api
    properties:
      srv-url: ${default-url}
  parameters:
    buildpack: nodejs_buildpack
    instances: 1
  build-parameters:
    builder: npm-ci

- name: CAPM_BookShop-db-deployer
  type: hdb
  path: gen/db
  requires:
  - name: CAPM_BookShop-db
  parameters:
    buildpack: nodejs_buildpack

- name: CAPM_BookShop-app-content
  type: com.sap.application.content
  path: .
  requires:
  - name: CAPM_BookShop-repo-host
    parameters:
      content-target: true
  - name: CAPM_BookShop-uaa
    parameters:
      service-key:
        name: CAPM_BookShop-uaa-key
  - name: CAPM_BookShop-destination-service
    parameters:
      service-key:
        name: CAPM_BookShop-destination-service-key
  build-parameters:
    build-result: resources
    requires:
    - artifacts:
        - listbooks.zip
      name: listbooks
      target-path: resources/
    - artifacts:
        - thebookshop.zip
      name: thebookshop
      target-path: resources/

- name: CAPM_BookShop-destination-content
  type: com.sap.application.content
  requires:
    - name: CAPM_BookShop-destination-service
      parameters:
        content-target: true
    - name: CAPM_BookShop-repo-host
      parameters:
        service-key:
          name: CAPM_BookShop-repo-host-key
    - name: CAPM_BookShop-uaa
      parameters:
        service-key:
          name: CAPM_BookShop-uaa-key
  parameters:
    content:
      instance:
        destinations:
          - Name: CAPM_BookShop_html5_repo
            ServiceInstanceName: CAPM_BookShop-html5-service
            ServiceKeyName: CAPM_BookShop-repo-host-key
            sap.cloud.service: bookshop
          - Name: CAPM_BookShop_uaa
            Authentication: OAuth2UserTokenExchange
            ServiceInstanceName: CAPM_BookShop-uaa
            ServiceKeyName: CAPM_BookShop-uaa-key
            sap.cloud.service: bookshop
        existing_destinations_policy: ignore
  build-parameters:
    no-source: true

- name: listbooks
  type: html5
  path: app/listbooks
  build-parameters:
    build-result: dist
    builder: custom
    commands:
    - npm install
    - npm run build:cf
    supported-platforms: []

- name: thebookshop
  type: html5
  path: app/custom_view_bookshop
  build-parameters:
    build-result: dist
    builder: custom
    commands:
    - npm install
    - npm run build:cf
    supported-platforms: []

resources:
- name: CAPM_BookShop-db
  type: com.sap.xs.hdi-container
  parameters:
    service: hana
    service-plan: hdi-shared

- name: CAPM_BookShop-uaa
  type: org.cloudfoundry.managed-service
  parameters:
    service: xsuaa
    service-plan: application
    path: ./xs-security.json

- name: CAPM_BookShop-repo-host
  type: org.cloudfoundry.managed-service
  parameters:
    service: html5-apps-repo
    service-name: CAPM_BookShop-html5-service
    service-plan: app-host

- name: CAPM_BookShop-destination-service
  type: org.cloudfoundry.managed-service
  requires:
  - name: srv-api
  parameters:
    config:
      HTML5Runtime_enabled: true
      init_data:
        instance:
          destinations:
          - Authentication: NoAuthentication
            Name: ui5
            ProxyType: Internet
            Type: HTTP
            URL: https://ui5.sap.com
          - Authentication: NoAuthentication
            Name: srv-api
            ProxyType: Internet
            Type: HTTP
            URL: ~{srv-api/srv-url}
          existing_destinations_policy: update
      version: 1.0.0
    service: destination
    service-name: CAPM_BookShop-destination-service
    service-plan: lite

parameters:
  deploy_mode: html5-repo
  enable-parallel-deployments: true

build-parameters:
  before-all:
  - builder: custom
    commands:
    - npm ci
    - npx cds build --production